<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarketInfrastructure | Candidate Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0d0f14; color: #e5e7eb; }
        .glass { background: rgba(31, 41, 55, 0.4); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .status-pending { color: #f59e0b; background: rgba(245, 158, 11, 0.1); border: 1px solid rgba(245, 158, 11, 0.2); }
        .status-confirmed { color: #10b981; background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2); }
    </style>
</head>
<body class="min-h-screen p-8">

    <header class="max-w-6xl mx-auto mb-12 flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-bold text-white tracking-tight">Market<span class="text-blue-500">Infrastructure</span></h1>
            <p class="text-gray-400 text-sm mt-1">GNN-First Structural Candidate Screening & Golden-Hour Confirmation</p>
        </div>
        <div class="flex gap-4">
            <button onclick="loadCandidates()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-xl text-sm font-semibold transition shadow-lg shadow-blue-900/20">Refresh Watchlist</button>
            <button onclick="mockConfirmation()" class="bg-gray-800 hover:bg-gray-700 text-gray-300 px-5 py-2 rounded-xl text-sm font-semibold border border-gray-700 transition">Test External System</button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto">
        <div class="glass rounded-3xl overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-900/50 text-[10px] text-gray-400 uppercase tracking-widest font-bold">
                    <tr>
                        <th class="px-8 py-5">Ticker</th>
                        <th class="py-5">GNN Prob</th>
                        <th class="py-5">Strategy Action</th>
                        <th class="py-5">20d High</th>
                        <th class="py-5">5d Avg Vol</th>
                        <th class="px-8 py-5">Golden Hour Status</th>
                    </tr>
                </thead>
                <tbody id="candidate-rows" class="text-sm divide-y divide-gray-800/50">
                    <!-- Loaded via JS -->
                </tbody>
            </table>
        </div>
        
        <div id="loading" class="hidden mt-8 text-center py-20 text-gray-500 animate-pulse">Scanning historical structural levels...</div>
    </main>

    <script>
        async function loadCandidates() {
            const tbody = document.getElementById('candidate-rows');
            const loader = document.getElementById('loading');
            
            tbody.innerHTML = '';
            loader.classList.remove('hidden');

            try {
                const response = await fetch('http://127.0.0.1:8002/candidates');
                const data = await response.json();
                
                loader.classList.add('hidden');
                data.forEach(cand => {
                    const row = document.createElement('tr');
                    row.className = 'hover:bg-gray-800/20 transition group';
                    
                    const statusClass = cand.golden_hour_status === 'CONFIRMED' ? 'status-confirmed' : 
                                       cand.golden_hour_status === 'PENDING' ? 'status-pending' : 'text-red-400';

                    row.innerHTML = `
                        <td class="px-8 py-5 font-bold text-white text-lg">${cand.ticker}</td>
                        <td class="py-5 font-mono text-blue-400">${cand.gnn_prob.toFixed(3)}</td>
                        <td class="py-5"><span class="bg-gray-800 px-3 py-1 rounded-full text-xs text-gray-300 capitalize">${cand.trading_action}</span></td>
                        <td class="py-5 text-gray-500 font-semibold">$${cand.resistance_20d.toFixed(2)}</td>
                        <td class="py-5 text-gray-500">${Math.round(cand.avg_vol_5d / 1000)}k</td>
                        <td class="px-8 py-5">
                            <div class="inline-block px-3 py-1 rounded-lg text-xs font-bold uppercase tracking-wider ${statusClass}">
                                ${cand.golden_hour_status}
                            </div>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (err) {
                loader.innerText = 'Failed to connect to Infrastructure API. Ensure port 8002 is running.';
            }
        }

        async function mockConfirmation() {
            const symbol = prompt("Enter symbol to confirm (e.g., HAL):", "HAL");
            if (!symbol) return;

            try {
                await fetch('http://127.0.0.1:8002/confirm', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        symbol: symbol.toUpperCase(),
                        trade_date: "2026-03-26",
                        passed_orb: true,
                        trigger_time_et: "10:15:00",
                        trigger_price: 11.50,
                        vwap_confirm: true
                    })
                });
                alert('Mock Golden-Hour Signal Sent for ' + symbol);
                loadCandidates();
            } catch (err) {
                alert('Connection Error');
            }
        }

        // Initial Load
        loadCandidates();
    </script>
</body>
</html>
